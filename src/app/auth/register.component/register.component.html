<div class="form-container">
  <h2>Register</h2>
  <form (ngSubmit)="register()">
    <input type="text" placeholder="Name" [(ngModel)]="user.name" name="name" required>
    <input type="email" placeholder="Email" [(ngModel)]="user.email" name="email" required>
    <input type="password" placeholder="Password" [(ngModel)]="user.password" name="password" required>
    <input type="text" placeholder="Phone" [(ngModel)]="user.phone" name="phone" required>
    <input type="text" placeholder="Address" [(ngModel)]="user.address" name="address" required>

    <select [(ngModel)]="user.role" name="role" required>
      <option value="Customer">Customer</option>
      <option value="Player">Player</option>
    </select>

    <button type="submit">Register</button>
  </form>
  <p class="message">{{message}}</p>
</div>
